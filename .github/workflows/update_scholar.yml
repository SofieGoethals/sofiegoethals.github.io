name: Update Publications from Semantic Scholar

on:
  schedule:
    - cron: "0 6 * * 1"   # Every Monday 06:00 UTC
  workflow_dispatch:       # Manual trigger from Actions tab

jobs:
  update-publications:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests pyyaml

      - name: Fetch publications from Semantic Scholar
        run: python scripts/update_publications.py

      - name: Commit changes (if any)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add _data/scholar_pubs.yml _data/news.yml content/publications.md
          if git diff --cached --quiet; then
            echo "Nothing changed — no commit needed."
          else
            git commit -m "chore: sync publications from Semantic Scholar [automated]"
            git push
          fi
